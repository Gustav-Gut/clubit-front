@if (isOpen()) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 sm:p-6">
    <!-- Modal Container -->
    <div class="w-full max-w-lg bg-slate-900/50 rounded-xl border border-slate-700/50 shadow-2xl overflow-hidden backdrop-blur-sm flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-700/50 bg-slate-800/30 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="size-10 rounded-full bg-primary/20 text-primary flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">receipt_long</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white tracking-tight">Create New Invoice</h2>
                    <p class="text-slate-400 text-sm mt-0.5">Generate a new payment request.</p>
                </div>
            </div>
            <button (click)="closeModal()"
                class="text-slate-400 hover:text-slate-100 transition-colors p-2 rounded-full hover:bg-slate-800/50 cursor-pointer flex items-center justify-center">
                <span class="material-symbols-outlined text-xl">close</span>
            </button>
        </div>

        <!-- Form Content -->
        <div class="flex-1 overflow-y-auto p-8 space-y-6">
            <!-- Select Student -->
            <div>
                <label class="text-sm font-medium text-slate-300 block mb-2" for="student">Select Student</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">search</span>
                    <select
                        class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary h-12 pl-12 pr-10 appearance-none transition-colors"
                        id="student">
                        <option class="bg-slate-800" disabled="" selected="" value="">Search student...</option>
                        <option class="bg-slate-800" value="1">Alex Johnson</option>
                        <option class="bg-slate-800" value="2">Maria Garcia</option>
                        <option class="bg-slate-800" value="3">David Smith</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                </div>
            </div>

            <!-- Concept -->
            <div>
                <label class="text-sm font-medium text-slate-300 block mb-2" for="concept">Concept</label>
                <input
                    class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 px-4 placeholder:text-slate-500 transition-colors"
                    id="concept" placeholder="e.g., July Tuition" type="text" />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Amount -->
                <div>
                    <label class="text-sm font-medium text-slate-300 block mb-2" for="amount">Amount</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
                        <input
                            class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 pl-8 pr-4 placeholder:text-slate-500 transition-colors"
                            id="amount" placeholder="0.00" type="number" />
                    </div>
                </div>
                <!-- Due Date -->
                <div>
                    <label class="text-sm font-medium text-slate-300 block mb-2" for="dueDate">Due Date</label>
                    <input
                        class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary h-12 px-4 transition-colors [color-scheme:dark]"
                        id="dueDate" type="date" />
                </div>
            </div>

            <!-- Payment Method -->
            <div>
                <label class="text-sm font-medium text-slate-300 block mb-2" for="paymentMethod">Payment Method</label>
                <div class="relative">
                    <select
                        class="w-full bg-slate-800/50 border border-slate-700/50 text-slate-100 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary h-12 pl-4 pr-10 appearance-none transition-colors"
                        id="paymentMethod">
                        <option class="bg-slate-800" value="cash">Cash</option>
                        <option class="bg-slate-800" value="card">Credit/Debit Card</option>
                        <option class="bg-slate-800" value="transfer">Bank Transfer</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-8 py-5 border-t border-slate-700/50 bg-slate-900/30 flex items-center justify-end gap-4 rounded-b-xl">
            <button (click)="closeModal()"
                class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800/50 transition-colors cursor-pointer">
                Cancel
            </button>
            <button
                class="px-6 py-2.5 rounded-lg text-sm font-medium text-white bg-primary hover:bg-primary/90 focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-primary transition-colors cursor-pointer shadow-lg shadow-primary/20 flex items-center gap-2">
                <span>Create Invoice</span>
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </div>
    </div>
</div>
}
